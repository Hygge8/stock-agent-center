name: stock-agent-center

services:
  daily-server:
    build:
      context: ${DAILY_REPO_CONTEXT:-https://github.com/Hygge8/daily_stock_analysis.git#fix/dingtalk-web-settings}
      dockerfile: docker/Dockerfile
    image: stock-agent-daily-stock-analysis:latest
    container_name: stock-agent-daily-server
    restart: unless-stopped
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${DAILY_WEB_PORT:-8000}:8000"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      DATABASE_PATH: /app/data/daily_stock_analysis.db
      DATA_DIR: /app/data
      REPORTS_DIR: /app/reports
      LOG_DIR: /app/logs
      STOCK_LIST: ${STOCK_POOL:-VGT,SPCX,DRAM,QLD,TQQQ,NVDA,TSLA,QQQM,QQQ}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      DINGTALK_SECRET: ${DINGTALK_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      LONGPORT_APP_KEY: ${LONGPORT_APP_KEY:-}
      LONGPORT_APP_SECRET: ${LONGPORT_APP_SECRET:-}
      LONGPORT_ACCESS_TOKEN: ${LONGPORT_ACCESS_TOKEN:-}
    volumes:
      - ../daily-data:/app/data
      - ../daily-reports:/app/reports
      - ../daily-logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  daily-analyzer:
    build:
      context: ${DAILY_REPO_CONTEXT:-https://github.com/Hygge8/daily_stock_analysis.git#fix/dingtalk-web-settings}
      dockerfile: docker/Dockerfile
    image: stock-agent-daily-stock-analysis:latest
    container_name: stock-agent-daily-analyzer
    restart: unless-stopped
    command: ["python", "main.py"]
    depends_on:
      - daily-server
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DATABASE_PATH: /app/data/daily_stock_analysis.db
      DATA_DIR: /app/data
      REPORTS_DIR: /app/reports
      LOG_DIR: /app/logs
      STOCK_LIST: ${STOCK_POOL:-VGT,SPCX,DRAM,QLD,TQQQ,NVDA,TSLA,QQQM,QQQ}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      DINGTALK_SECRET: ${DINGTALK_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      LONGPORT_APP_KEY: ${LONGPORT_APP_KEY:-}
      LONGPORT_APP_SECRET: ${LONGPORT_APP_SECRET:-}
      LONGPORT_ACCESS_TOKEN: ${LONGPORT_ACCESS_TOKEN:-}
    volumes:
      - ../daily-data:/app/data
      - ../daily-reports:/app/reports
      - ../daily-logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  uzi-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.uzi
      args:
        UZI_REPO: ${UZI_REPO:-https://github.com/Hygge8/UZI-Skill.git}
        UZI_REF: ${UZI_REF:-feature/uzi-web-docker}
    image: stock-agent-uzi-skill:latest
    container_name: stock-agent-uzi-server
    restart: unless-stopped
    ports:
      - "${UZI_WEB_PORT:-8977}:8977"
    environment:
      UZI_WEB_HOST: 0.0.0.0
      UZI_WEB_PORT: 8977
      UZI_WEB_DATA_DIR: /app/data
      UZI_WEB_LOGS_DIR: /app/logs
      UZI_WEB_REPORTS_DIR: /app/reports
      UZI_WEB_DEFAULT_DEPTH: ${UZI_WEB_DEFAULT_DEPTH:-lite}
      UZI_WEB_MAX_PARALLEL_JOBS: ${UZI_WEB_MAX_PARALLEL_JOBS:-1}
      UZI_WEB_MAX_QUEUE_SIZE: ${UZI_WEB_MAX_QUEUE_SIZE:-30}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      DINGTALK_SECRET: ${DINGTALK_SECRET:-}
      MX_APIKEY: ${MX_APIKEY:-}
      STOCK_NO_CACHE: ${STOCK_NO_CACHE:-}
    volumes:
      - ../uzi-data:/app/data
      - ../uzi-logs:/app/logs
      - ../uzi-reports:/app/reports
      - ../uzi-cache:/app/skills/deep-analysis/scripts/.cache
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  agent-center:
    build:
      context: ..
      dockerfile: Dockerfile
    image: stock-agent-center:latest
    container_name: stock-agent-center
    restart: unless-stopped
    depends_on:
      - daily-server
      - uzi-server
    env_file:
      - path: ../.env
        required: false
    ports:
      - "${SERVER_PORT:-9000}:${SERVER_PORT:-9000}"
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: ${SERVER_PORT:-9000}
      DATABASE_URL: sqlite:///database/stock_agent.db
      UZI_API_URL: http://uzi-server:8977
      UZI_DEFAULT_DEPTH: ${UZI_DEFAULT_DEPTH:-deep}
      UZI_REQUEST_TIMEOUT: ${UZI_REQUEST_TIMEOUT:-30}
      STOCK_POOL: ${STOCK_POOL:-VGT,SPCX,DRAM,QLD,TQQQ,NVDA,TSLA,QQQM,QQQ}
      SCAN_PERIOD: ${SCAN_PERIOD:-3mo}
      SCAN_INTERVAL: ${SCAN_INTERVAL:-1d}
      AUTO_SUBMIT_SCAN_RESULTS: ${AUTO_SUBMIT_SCAN_RESULTS:-true}
      DAILY_API_URL: http://daily-server:8000
      ENABLE_DAILY_SYNC: ${ENABLE_DAILY_SYNC:-true}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      DINGTALK_SECRET: ${DINGTALK_SECRET:-}
      ENABLE_DINGTALK_NOTIFY: ${ENABLE_DINGTALK_NOTIFY:-false}
      DEEP_SCORE_THRESHOLD: ${DEEP_SCORE_THRESHOLD:-85}
      MEDIUM_SCORE_THRESHOLD: ${MEDIUM_SCORE_THRESHOLD:-70}
      ENABLE_SCHEDULE: ${ENABLE_SCHEDULE:-false}
      SCAN_TIME: ${SCAN_TIME:-18:00}
      SCHEDULE_DEPTH: ${SCHEDULE_DEPTH:-deep}
    volumes:
      - ../database:/app/database
      - ../reports:/app/reports
      - ../logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
